name: Provision Actor

on:
  workflow_dispatch:
    inputs:
      username:
        description: "Actor username (lowercase, no spaces, e.g. 'myapp')"
        required: true
        type: string
      display-name:
        description: "Display name (e.g. 'My App')"
        required: true
        type: string
      summary:
        description: "Bio / summary text"
        required: false
        type: string
        default: ""
      stage:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod
        default: stage

permissions:
  contents: read

jobs:
  provision:
    runs-on: ${{ vars.RUNNER_LABELS_LINUX && fromJSON(vars.RUNNER_LABELS_LINUX) || 'ubuntu-latest' }}
    steps:
      - name: Clean workspace (self-hosted)
        if: ${{ vars.RUNNER_LABELS_LINUX }}
        run: |
          sudo rm -rf .build/
          sudo git clean -fdx -e .git || true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install Swift dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils gcc g++ libc6-dev libcurl4-openssl-dev libssl-dev libxml2-dev pkg-config unzip
          # Ensure pkg-config binary exists (Ubuntu 24.04 may install pkgconf instead)
          which pkg-config || sudo ln -sf /usr/bin/pkgconf /usr/bin/pkg-config || true

      - name: Install AWS CLI
        run: |
          if ! command -v aws &>/dev/null; then
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o /tmp/awscliv2.zip
            else
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            fi
            unzip -q /tmp/awscliv2.zip -d /tmp && sudo /tmp/aws/install
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi
          aws --version

      - name: Install Swift
        run: |
          if swift --version 2>/dev/null | grep -q "6.3"; then
            echo "Swift 6.3 already installed"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404-aarch64/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04-aarch64.tar.gz"
            else
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz"
            fi
            curl -fsSL "$SWIFT_URL" | sudo tar xz --strip-components=2 -C /usr/local
          fi
          swift --version

      - name: Fix Swift 6.3 ICU header conflict
        run: |
          # Swift 6.3 bundles _FoundationICU (ICU 76+) which has newer UErrorCode
          # enums than system ICU 74. Replace system ICU headers with Swift's bundled
          # version so libxml2 headers resolve against the same ICU version Swift uses.
          SWIFT_ICU_DIR=$(find /usr/local/lib/swift -name '_foundation_unicode' -type d | head -1)
          if [ -n "$SWIFT_ICU_DIR" ]; then
            # Remove system ICU headers
            sudo rm -rf /usr/include/unicode
            ARCH_INCLUDE="/usr/include/$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || echo '')"
            [ -d "$ARCH_INCLUDE/unicode" ] && sudo rm -rf "$ARCH_INCLUDE/unicode"
            # Symlink Swift's ICU headers as system unicode headers
            sudo ln -sf "$SWIFT_ICU_DIR" /usr/include/unicode
            echo "Replaced system ICU headers with Swift's bundled ICU from $SWIFT_ICU_DIR"
          else
            echo "Warning: Could not find Swift's _foundation_unicode headers"
          fi

      - name: Build ActivityProvisioner
        run: swift build --product ActivityProvisioner

      - name: Provision actor
        run: |
          swift run ActivityProvisioner \
            --stage ${{ inputs.stage }} \
            --username "${{ inputs.username }}" \
            --display-name "${{ inputs.display-name }}" \
            --summary "${{ inputs.summary }}" \
            --server-domain "${{ vars.SERVER_DOMAIN }}" \
            --handle-domain "${{ vars.HANDLE_DOMAIN }}"

      - name: Generate bearer token
        run: |
          TOKEN=$(openssl rand -hex 32)
          echo "::add-mask::$TOKEN"
          TOKEN_HASH=$(echo -n "$TOKEN" | shasum -a 256 | cut -d' ' -f1)
          TTL=$(( $(date +%s) + 31536000 ))  # 1 year
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          aws dynamodb put-item \
            --table-name "activity-${{ inputs.stage }}" \
            --item "{
              \"PK\": {\"S\": \"TOKEN#${TOKEN_HASH}\"},
              \"SK\": {\"S\": \"META\"},
              \"username\": {\"S\": \"${{ inputs.username }}\"},
              \"scope\": {\"S\": \"read write\"},
              \"createdAt\": {\"S\": \"${NOW}\"},
              \"ttl\": {\"N\": \"${TTL}\"},
              \"description\": {\"S\": \"provisioned via workflow\"}
            }" \
            --region ${{ vars.AWS_REGION || 'us-east-1' }}
          echo "## Actor Provisioned" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Username:** ${{ inputs.username }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Stage:** ${{ inputs.stage }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Handle:** @${{ inputs.username }}@${{ vars.HANDLE_DOMAIN }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The bearer token has been stored in DynamoDB table \`activity-${{ inputs.stage }}\`." >> "$GITHUB_STEP_SUMMARY"
          echo "Token hash: \`${TOKEN_HASH}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Raw token (copy now -- it cannot be retrieved later):**" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "$TOKEN" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This token is unique to **${{ inputs.username }}** and does not affect other accounts." >> "$GITHUB_STEP_SUMMARY"

      - name: Verify actor
        run: |
          DOMAIN="${{ vars.SERVER_DOMAIN }}"
          HANDLE_DOMAIN="${{ vars.HANDLE_DOMAIN }}"
          echo "Waiting 10s for CloudFront propagation..."
          sleep 10
          echo "--- WebFinger ---"
          curl -sf "https://$DOMAIN/.well-known/webfinger?resource=acct:${{ inputs.username }}@$HANDLE_DOMAIN" | jq . || echo "WebFinger not yet available (may take a few minutes for DNS/cache)"
          echo ""
          echo "--- Actor ---"
          curl -sf -H "Accept: application/activity+json" "https://$DOMAIN/users/${{ inputs.username }}" | jq .id || echo "Actor not yet available"
