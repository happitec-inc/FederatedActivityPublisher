name: Run Integration Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ${{ vars.RUNNER_LABELS_LINUX && fromJSON(vars.RUNNER_LABELS_LINUX) || 'ubuntu-latest' }}
    steps:
      - name: Clean workspace (self-hosted)
        if: ${{ vars.RUNNER_LABELS_LINUX }}
        run: |
          sudo rm -rf .build/
          sudo git clean -fdx -e .git || true

      - uses: actions/checkout@v6
        with:
          clean: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Get API URLs and bearer token
        id: api
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${{ inputs.environment }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text --region ${{ vars.AWS_REGION || 'us-east-1' }})
          CLIENT_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${{ inputs.environment }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ClientApiUrl'].OutputValue" \
            --output text --region ${{ vars.AWS_REGION || 'us-east-1' }})
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "client_url=$CLIENT_API_URL" >> "$GITHUB_OUTPUT"
          echo "Testing against: $API_URL (federation) + $CLIENT_API_URL (client)"

          TOKEN_VALUE=$(aws ssm get-parameter \
            --name "/activity/${{ inputs.environment }}/keys/client-token" \
            --with-decryption --query "Parameter.Value" --output text --region ${{ vars.AWS_REGION || 'us-east-1' }} 2>/dev/null || echo "")
          if [ -n "$TOKEN_VALUE" ]; then
            BEARER=$(echo "$TOKEN_VALUE" | cut -d: -f2)
            echo "bearer=$BEARER" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Swift dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils gcc g++ libc6-dev libcurl4-openssl-dev libssl-dev libxml2-dev pkg-config
          # Ensure pkg-config binary exists (Ubuntu 24.04 may install pkgconf instead)
          which pkg-config || sudo ln -sf /usr/bin/pkgconf /usr/bin/pkg-config || true

      - name: Install Swift
        run: |
          if swift --version 2>/dev/null | grep -q "6.3"; then
            echo "Swift 6.3 already installed"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404-aarch64/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04-aarch64.tar.gz"
            else
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz"
            fi
            curl -fsSL "$SWIFT_URL" | sudo tar xz --strip-components=2 -C /usr/local
          fi
          swift --version

      - name: Fix Swift 6.3 ICU header conflict
        run: |
          SWIFT_ICU_DIR=$(find /usr/local/lib/swift -name '_foundation_unicode' -type d | head -1)
          if [ -n "$SWIFT_ICU_DIR" ]; then
            sudo rm -rf /usr/include/unicode
            ARCH_INCLUDE="/usr/include/$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || echo '')"
            [ -d "$ARCH_INCLUDE/unicode" ] && sudo rm -rf "$ARCH_INCLUDE/unicode"
            sudo ln -sf "$SWIFT_ICU_DIR" /usr/include/unicode
            echo "Replaced system ICU headers with Swift's bundled ICU from $SWIFT_ICU_DIR"
          fi

      - name: Run integration tests
        env:
          TEST_API_URL: ${{ steps.api.outputs.url }}
          TEST_CLIENT_API_URL: ${{ steps.api.outputs.client_url }}
          TEST_BEARER_TOKEN: ${{ steps.api.outputs.bearer }}
          TEST_HANDLE_DOMAIN: ${{ inputs.environment == 'prod' && vars.HANDLE_DOMAIN || format('{0}.{1}', inputs.environment, vars.HANDLE_DOMAIN) }}
          LD_LIBRARY_PATH: /usr/local/lib/swift/linux
        run: cd integration-tests && swift test
