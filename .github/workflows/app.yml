name: Deploy App Stack
run-name: "Deploy App Stack (${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.stage == 'prod')) && 'prod' || 'stage' }})"

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    if: >-
      github.event_name != 'release' ||
      (github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'v'))
    runs-on: ${{ vars.RUNNER_LABELS_LINUX && fromJSON(vars.RUNNER_LABELS_LINUX) || 'ubuntu-latest' }}
    outputs:
      api_url: ${{ steps.stack-outputs.outputs.api_url }}
      client_api_url: ${{ steps.stack-outputs.outputs.client_api_url }}
      stage: ${{ steps.stack-outputs.outputs.stage }}
    env:
      STAGE: ${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.stage == 'prod')) && 'prod' || 'stage' }}
    steps:
      - name: Clean workspace (self-hosted)
        if: ${{ vars.RUNNER_LABELS_LINUX }}
        run: |
          sudo rm -rf .build/ || true
          sudo git clean -fdx -e .git || true
          docker container prune -f || true
          docker builder prune -af --filter "until=24h" || true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Install SAM CLI
        uses: ./.github/actions/setup-sam-portable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Swift
        run: |
          if swift --version 2>/dev/null | grep -q "6.3"; then
            echo "Swift 6.3 already installed"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404-aarch64/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04-aarch64.tar.gz"
            else
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz"
            fi
            curl -fsSL "$SWIFT_URL" | sudo tar xz --strip-components=2 -C /usr/local
          fi
          swift --version

      - name: Install zip
        run: which zip || sudo apt-get install -y zip

      - name: Build AL2023 Swift Docker image (cached)
        run: |
          HASH=$(sha256sum docker/Dockerfile.al2023-swift | cut -c1-12)
          if docker image inspect "swift-al2023:cache-$HASH" >/dev/null 2>&1; then
            echo "Using cached image (Dockerfile hash: $HASH)"
            docker tag "swift-al2023:cache-$HASH" swift-al2023:6.3
          else
            echo "Building image (Dockerfile hash: $HASH)"
            docker build -t swift-al2023:6.3 -f docker/Dockerfile.al2023-swift .
            docker tag swift-al2023:6.3 "swift-al2023:cache-$HASH"
          fi

      - name: Build Lambda zip
        run: swift package --allow-network-connections docker archive --base-docker-image swift-al2023:6.3 --disable-docker-image-update

      - name: Deploy with SAM
        run: |
          sam deploy \
            --template-file activity-app/template.yaml \
            --stack-name "activity-app-${{ env.STAGE }}" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region us-east-1 \
            --parameter-overrides \
              Stage=${{ env.STAGE }} \
              EnvironmentStackName=activity-environment-${{ env.STAGE }} \
              BootstrapStackName=activity-bootstrap \
              ServerDomain=${{ vars.SERVER_DOMAIN }} \
              HandleDomain=${{ vars.HANDLE_DOMAIN }} \
              ProxyDistributionId=${{ vars.PROXY_DISTRIBUTION_ID }} \
              ActivityDistributionId=${{ vars.ACTIVITY_DISTRIBUTION_ID }}

      - name: Upload frontend assets
        run: |
          MEDIA_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "activity-environment-${{ env.STAGE }}" \
            --query "Stacks[0].Outputs[?OutputKey=='MediaBucketName'].OutputValue" \
            --output text \
            --region us-east-1 2>/dev/null || echo "")
          if [ -n "$MEDIA_BUCKET" ] && [ "$MEDIA_BUCKET" != "None" ]; then
            aws s3 sync frontend/ "s3://$MEDIA_BUCKET/media/frontend/" \
              --cache-control "public, max-age=31536000, immutable"
            echo "Uploaded frontend assets to s3://$MEDIA_BUCKET/media/frontend/"
          else
            echo "Warning: Could not determine media bucket name, skipping frontend upload"
          fi

      - name: Print stack outputs
        id: stack-outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${{ env.STAGE }}" \
            --query "Stacks[0].Outputs" \
            --output table \
            --region us-east-1)
          echo "## Stack Outputs (${{ env.STAGE }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$OUTPUTS" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${{ env.STAGE }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text --region us-east-1)
          CLIENT_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${{ env.STAGE }}" \
            --query "Stacks[0].Outputs[?OutputKey=='ClientApiUrl'].OutputValue" \
            --output text --region us-east-1)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "client_api_url=$CLIENT_API_URL" >> "$GITHUB_OUTPUT"
          echo "stage=${{ env.STAGE }}" >> "$GITHUB_OUTPUT"

  integration-tests:
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ${{ vars.RUNNER_LABELS_LINUX && fromJSON(vars.RUNNER_LABELS_LINUX) || 'ubuntu-latest' }}
    steps:
      - name: Clean workspace (self-hosted)
        if: ${{ vars.RUNNER_LABELS_LINUX }}
        run: |
          sudo rm -rf .build/
          sudo git clean -fdx -e .git || true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Swift
        run: |
          if swift --version 2>/dev/null | grep -q "6.3"; then
            echo "Swift 6.3 already installed"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404-aarch64/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04-aarch64.tar.gz"
            else
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz"
            fi
            curl -fsSL "$SWIFT_URL" | sudo tar xz --strip-components=2 -C /usr/local
          fi
          swift --version

      - name: Get bearer token from SSM
        id: token
        run: |
          TOKEN_VALUE=$(aws ssm get-parameter \
            --name "/activity/${{ needs.deploy.outputs.stage }}/keys/client-token" \
            --with-decryption --query "Parameter.Value" --output text --region us-east-1 2>/dev/null || echo "")
          if [ -n "$TOKEN_VALUE" ]; then
            # Format is "username:token" — extract just the token
            BEARER=$(echo "$TOKEN_VALUE" | cut -d: -f2)
            echo "bearer=$BEARER" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        env:
          TEST_API_URL: ${{ needs.deploy.outputs.api_url }}
          TEST_CLIENT_API_URL: ${{ needs.deploy.outputs.client_api_url }}
          TEST_BEARER_TOKEN: ${{ steps.token.outputs.bearer }}
          LD_LIBRARY_PATH: /usr/local/lib/swift/linux
        run: swift test --filter IntegrationTests
