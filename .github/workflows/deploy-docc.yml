# Public DocC deploy. No private dependencies: uses the public swift-docc-render
# fork (Mermaid support) and a committed static OG image (docs-assets/og-image.png)
# with a local post-process step. Jobs are gated to the canonical repo, so forks
# skip cleanly without any secret or variable.
#
# The dynamic-OG variant (which generated the OG image via the private
# happitec-logo-generator) is parked at deploy-docc.dynamic-og.yml.disabled and can
# return once a public, gated logo API exists (happitec-inc/happitec-logo-generator#52).

name: Deploy DocC Documentation

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: github.repository == 'happitec-inc/FederatedActivityPublisher'
    runs-on: ${{ vars.RUNNER_LABELS_MACOS && fromJSON(vars.RUNNER_LABELS_MACOS) || 'macos-26' }}
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Select Xcode with Swift 6.3
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -rV | head -1)
          XCODE_PATH="${XCODE_PATH:-$(ls -d /Applications/Xcode.app 2>/dev/null)}"
          if [ -n "$XCODE_PATH" ]; then
            sudo xcode-select -s "$XCODE_PATH"
            echo "Selected: $XCODE_PATH"
          fi
          swift --version

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Substitute domain variables
        run: |
          SERVER_DOMAIN="${{ vars.SERVER_DOMAIN }}" \
          HANDLE_DOMAIN="${{ vars.HANDLE_DOMAIN }}" \
          bash scripts/substitute-variables.sh

      - name: Checkout swift-docc-render fork (Mermaid support)
        uses: actions/checkout@v6
        with:
          repository: happitec-inc/swift-docc-render
          ref: feature/mermaid-diagrams
          path: swift-docc-render-fork

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build swift-docc-render fork
        run: |
          cd swift-docc-render-fork
          npm install
          npm run build

      - name: Build DocC via swift-docc-plugin
        env:
          DOCC_HTML_DIR: ${{ github.workspace }}/swift-docc-render-fork/dist
        run: |
          swift package \
            --allow-writing-to-directory ./docs \
            generate-documentation \
            --target ActivityPubCore \
            --output-path ./docs \
            --transform-for-static-hosting \
            --hosting-base-path FederatedActivityPublisher

      # Write the root redirect BEFORE OG injection so the post-process step stamps
      # og:/twitter: meta into it too. The bare site root is the most-shared URL, so
      # it must carry the social card.
      - name: Add root redirect
        run: |
          cat > ./docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=documentation/activitypubcore/">
            <link rel="canonical" href="documentation/activitypubcore/">
          </head>
          <body>
            <a href="documentation/activitypubcore/">Redirecting…</a>
          </body>
          </html>
          EOF

      - name: Inject OG image and meta tags
        run: |
          bash scripts/docc-og-postprocess.sh \
            ./docs \
            docs-assets/og-image.png \
            "${{ vars.DOCC_BASE_URL || format('https://{0}.github.io/FederatedActivityPublisher', github.repository_owner) }}" \
            "FederatedActivityPublisher — Documentation" \
            "A serverless ActivityPub server for brand accounts. Swift 6.3 on AWS Lambda, federated with Mastodon."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    if: github.repository == 'happitec-inc/FederatedActivityPublisher'
    needs: build
    runs-on: ${{ vars.RUNNER_LABELS_MACOS && fromJSON(vars.RUNNER_LABELS_MACOS) || 'macos-26' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
