name: Deploy DocC Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-og-image:
    uses: happitec-inc/happitec-logo-generator/.github/workflows/generate-og-image.yml@main
    with:
      secondary-text: "FederatedActivityPublisher"
    secrets:
      token: ${{ secrets.HAPPITEC_READ_ONLY_PAT }}

  build:
    needs: [generate-og-image]
    runs-on: [self-hosted, macOS]
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout swift-docc-render fork (Mermaid support)
        uses: actions/checkout@v6
        with:
          repository: happitec-inc/swift-docc-render
          ref: feature/mermaid-diagrams
          path: swift-docc-render-fork

      - name: Download OG image
        uses: actions/download-artifact@v6
        with:
          name: og-image
          path: ./og-image/

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build swift-docc-render fork
        run: |
          cd swift-docc-render-fork
          npm install
          npm run build

      - name: Build DocC via swift-docc-plugin
        env:
          DOCC_HTML_DIR: ${{ github.workspace }}/swift-docc-render-fork/dist
        run: |
          swift package \
            --allow-writing-to-directory ./docs \
            generate-documentation \
            --target ActivityPubCore \
            --output-path ./docs \
            --transform-for-static-hosting \
            --hosting-base-path FederatedActivityPublisher

      - name: Replace OG image with generated logo
        run: |
          if [ -f "./og-image/og-image.png" ]; then
            # Convert PNG to JPG for DocC compatibility
            sips -s format jpeg ./og-image/og-image.png --out ./docs/developer-og.jpg
            sips -s format jpeg ./og-image/og-image.png --out ./docs/developer-og-twitter.jpg
            echo "Replaced DocC OG images with generated logo"
          else
            echo "Warning: Generated OG image not found, using default"
          fi

      - name: Inject OG meta tags into HTML
        run: |
          BASE_URL="https://docs.happitec.com/FederatedActivityPublisher"
          OG_TAGS='<meta property="og:type" content="website"><meta property="og:site_name" content="Happitec"><meta property="og:title" content="FederatedActivityPublisher — Documentation"><meta property="og:description" content="A serverless ActivityPub server for brand accounts. Swift 6.3 on AWS Lambda, federated with Mastodon."><meta property="og:url" content="'"$BASE_URL"'/documentation/activitypubcore/"><meta property="og:image" content="'"$BASE_URL"'/developer-og.jpg"><meta property="og:image:width" content="2400"><meta property="og:image:height" content="1260"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="FederatedActivityPublisher — Documentation"><meta name="twitter:description" content="A serverless ActivityPub server for brand accounts. Swift 6.3 on AWS Lambda."><meta name="twitter:image" content="'"$BASE_URL"'/developer-og-twitter.jpg">'
          # Inject into all HTML files after <meta charset>
          find ./docs -name "*.html" -exec sed -i '' "s|<meta charset=\"utf-8\">|<meta charset=\"utf-8\">${OG_TAGS}|g" {} +
          echo "Injected OG meta tags into $(find ./docs -name '*.html' | wc -l | tr -d ' ') HTML files"

      - name: Add root redirect
        run: |
          cat > ./docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=documentation/activitypubcore/">
            <link rel="canonical" href="documentation/activitypubcore/">
          </head>
          <body>
            <a href="documentation/activitypubcore/">Redirecting…</a>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: [self-hosted, macOS]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
