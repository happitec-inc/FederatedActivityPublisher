name: Deploy App Stack
run-name: "Deploy App Stack (${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.stage == 'prod')) && 'prod' || 'stage' }})"

on:
  workflow_run:
    workflows: ["Build App"]
    types: [completed]
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        type: choice
        options:
          - stage
          - prod
      run_id:
        description: "Build workflow run ID to deploy (uses latest successful if empty)"
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.stack-outputs.outputs.api_url }}
      client_api_url: ${{ steps.stack-outputs.outputs.client_api_url }}
      stage: ${{ steps.set-stage.outputs.stage }}
    steps:
      - name: Determine stage
        id: set-stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stage=${{ inputs.stage }}" >> "$GITHUB_OUTPUT"
          else
            # Infer from the build workflow's run name which contains the stage
            DISPLAY='${{ github.event.workflow_run.display_title }}'
            if echo "$DISPLAY" | grep -q '(prod)'; then
              echo "stage=prod" >> "$GITHUB_OUTPUT"
            else
              echo "stage=stage" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Resolve build run ID
        id: resolve-run
        env:
          GH_TOKEN: ${{ github.token }}
          STAGE: ${{ steps.set-stage.outputs.stage }}
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            echo "run_id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            # Find latest successful build for this stage
            RUN_ID=$(gh api repos/${{ github.repository }}/actions/workflows/build.yml/runs \
              --jq ".workflow_runs[] | select(.conclusion==\"success\" and .head_branch==\"main\") | .id" \
              | head -1)
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged template
        uses: actions/download-artifact@v4
        with:
          name: sam-package-${{ steps.set-stage.outputs.stage }}
          run-id: ${{ steps.resolve-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-${{ steps.set-stage.outputs.stage }}
          path: frontend/
          run-id: ${{ steps.resolve-run.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Install SAM CLI
        run: |
          pip3 install --break-system-packages aws-sam-cli 2>/dev/null || pip3 install aws-sam-cli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy with SAM
        env:
          STAGE: ${{ steps.set-stage.outputs.stage }}
        run: |
          sam deploy \
            --template-file packaged.yaml \
            --stack-name "activity-app-${STAGE}" \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region ${{ vars.AWS_REGION || 'us-east-1' }} \
            --parameter-overrides \
              Stage=${STAGE} \
              EnvironmentStackName=activity-environment-${STAGE} \
              BootstrapStackName=activity-bootstrap \
              ServerDomain=${{ vars.SERVER_DOMAIN }} \
              HandleDomain=${{ vars.HANDLE_DOMAIN }} \
              ProxyDistributionId=${{ vars.PROXY_DISTRIBUTION_ID }} \
              ActivityDistributionId=${{ steps.set-stage.outputs.stage == 'prod' && vars.ACTIVITY_DISTRIBUTION_ID_PROD || vars.ACTIVITY_DISTRIBUTION_ID_STAGE }} \
              ClientApiDomain=${{ steps.set-stage.outputs.stage == 'prod' && vars.CLIENT_API_DOMAIN_PROD || vars.CLIENT_API_DOMAIN_STAGE }}

      - name: Upload frontend assets
        env:
          STAGE: ${{ steps.set-stage.outputs.stage }}
        run: |
          MEDIA_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "activity-environment-${STAGE}" \
            --query "Stacks[0].Outputs[?OutputKey=='MediaBucketName'].OutputValue" \
            --output text \
            --region ${{ vars.AWS_REGION || 'us-east-1' }} 2>/dev/null || echo "")
          if [ -n "$MEDIA_BUCKET" ] && [ "$MEDIA_BUCKET" != "None" ]; then
            aws s3 sync frontend/ "s3://$MEDIA_BUCKET/media/frontend/" \
              --cache-control "public, max-age=31536000, immutable"
            echo "Uploaded frontend assets to s3://$MEDIA_BUCKET/media/frontend/"
          else
            echo "Warning: Could not determine media bucket name, skipping frontend upload"
          fi

      - name: Print stack outputs
        id: stack-outputs
        env:
          STAGE: ${{ steps.set-stage.outputs.stage }}
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${STAGE}" \
            --query "Stacks[0].Outputs" \
            --output table \
            --region ${{ vars.AWS_REGION || 'us-east-1' }})
          echo "## Stack Outputs (${STAGE})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$OUTPUTS" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${STAGE}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text --region ${{ vars.AWS_REGION || 'us-east-1' }})
          CLIENT_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${STAGE}" \
            --query "Stacks[0].Outputs[?OutputKey=='ClientApiUrl'].OutputValue" \
            --output text --region ${{ vars.AWS_REGION || 'us-east-1' }})
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "client_api_url=$CLIENT_API_URL" >> "$GITHUB_OUTPUT"
          echo "stage=${STAGE}" >> "$GITHUB_OUTPUT"

