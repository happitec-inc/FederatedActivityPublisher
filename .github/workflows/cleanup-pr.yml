name: Cleanup PR Stack

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

concurrency:
  group: deploy-pr-${{ github.event.pull_request.number }}

jobs:
  cleanup:
    runs-on: [self-hosted, linux]
    env:
      STACK_NAME: activity-app-pr-${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SAM CLI
        uses: happitec-inc/happitec-logo-generator/.github/actions/setup-sam-portable@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Delete PR stack
        run: |
          echo "Deleting stack ${{ env.STACK_NAME }}..."
          sam delete \
            --stack-name "${{ env.STACK_NAME }}" \
            --region us-east-1 \
            --no-prompts \
          || echo "Stack may not exist or already deleted"
