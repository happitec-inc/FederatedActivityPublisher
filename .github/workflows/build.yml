name: Build App
run-name: "Build App (${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.stage == 'prod')) && 'prod' || 'stage' }})"

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: read

jobs:
  build:
    if: >-
      github.event_name != 'release' ||
      (github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'v'))
    # runs-on: ${{ vars.RUNNER_LABELS_LINUX && fromJSON(vars.RUNNER_LABELS_LINUX) || 'ubuntu-latest' }}
    runs-on: linux_large
    env:
      STAGE: ${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.stage == 'prod')) && 'prod' || 'stage' }}
    steps:
      # - name: Clean workspace (self-hosted, prod only)
      #   if: ${{ vars.RUNNER_LABELS_LINUX && env.STAGE == 'prod' }}
      #   run: |
      #     sudo rm -rf .build/ || true
      #     sudo git clean -fdx -e .git || true
      #     docker container prune -f || true
      #     docker builder prune -af --filter "until=24h" || true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Install Swift dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils gcc libc6-dev libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install Swift
        run: |
          if swift --version 2>/dev/null | grep -q "6.3"; then
            echo "Swift 6.3 already installed"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404-aarch64/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04-aarch64.tar.gz"
            else
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz"
            fi
            curl -fsSL "$SWIFT_URL" | sudo tar xz --strip-components=2 -C /usr/local
          fi
          swift --version

      - name: Install zip
        run: which zip || sudo apt-get install -y zip

      - name: Install Docker
        run: |
          if command -v docker &>/dev/null; then
            echo "Docker already installed"
          else
            curl -fsSL https://get.docker.com | sudo sh
          fi
          sudo chmod 666 /var/run/docker.sock
          docker --version

      - name: Cache Docker image
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image.tar
          key: docker-al2023-swift-${{ hashFiles('docker/Dockerfile.al2023-swift') }}

      - name: Load or build AL2023 Swift Docker image
        run: |
          if [ -f /tmp/docker-image.tar ]; then
            echo "Loading cached Docker image"
            docker load < /tmp/docker-image.tar
          else
            echo "Building Docker image"
            docker build -t swift-al2023:6.3 -f docker/Dockerfile.al2023-swift .
            docker save swift-al2023:6.3 > /tmp/docker-image.tar
          fi

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-build-${{ hashFiles('Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            swift-build-${{ hashFiles('Package.resolved') }}-
            swift-build-

      - name: Build Lambda zip
        run: swift package --allow-network-connections docker archive --base-docker-image swift-al2023:6.3 --disable-docker-image-update

      - name: Install SAM CLI
        uses: ./.github/actions/setup-sam-portable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Package with SAM
        run: |
          sam package \
            --template-file activity-app/template.yaml \
            --output-template-file packaged.yaml \
            --resolve-s3 \
            --region us-east-1

      - name: Upload packaged template
        uses: actions/upload-artifact@v4
        with:
          name: sam-package-${{ env.STAGE }}
          path: packaged.yaml
          retention-days: 7

      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ env.STAGE }}
          path: frontend/
          retention-days: 7
