name: Deploy Prod
run-name: "Deploy Prod (${{ github.event.release.tag_name || 'manual' }})"

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  STAGE: prod
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  build-and-deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.release.prerelease == false && startsWith(github.event.release.tag_name, 'v'))
    runs-on: ${{ vars.RUNNER_LABELS_LINUX && fromJSON(vars.RUNNER_LABELS_LINUX) || 'ubuntu-latest' }}
    environment:
      name: production
      url: https://${{ vars.SERVER_DOMAIN || 'activity.example.com' }}
    steps:
      - name: Clean workspace (self-hosted)
        if: ${{ vars.RUNNER_LABELS_LINUX }}
        run: |
          sudo rm -rf .build/ || true
          sudo git clean -fdx -e .git || true
          docker container prune -f || true
          docker builder prune -af --filter "until=24h" || true

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Substitute domain variables
        run: |
          SERVER_DOMAIN="${{ vars.SERVER_DOMAIN }}" \
          HANDLE_DOMAIN="${{ vars.HANDLE_DOMAIN }}" \
          bash scripts/substitute-variables.sh

      - name: Install Swift dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils gcc g++ libc6-dev libcurl4-openssl-dev libssl-dev libxml2-dev pkg-config

      - name: Install Swift
        run: |
          if swift --version 2>/dev/null | grep -q "6.3"; then
            echo "Swift 6.3 already installed"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404-aarch64/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04-aarch64.tar.gz"
            else
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz"
            fi
            curl -fsSL "$SWIFT_URL" | sudo tar xz --strip-components=2 -C /usr/local
          fi
          swift --version

      - name: Install zip
        run: which zip || sudo apt-get install -y zip

      - name: Install Docker
        run: |
          if command -v docker &>/dev/null; then
            echo "Docker already installed"
          else
            curl -fsSL https://get.docker.com | sudo sh
          fi
          sudo chmod 666 /var/run/docker.sock
          docker --version

      - name: Cache Docker image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image.tar
          key: docker-al2023-swift-${{ hashFiles('docker/Dockerfile.al2023-swift') }}

      - name: Load or build AL2023 Swift Docker image
        run: |
          if [ -f /tmp/docker-image.tar ]; then
            echo "Loading cached Docker image"
            docker load < /tmp/docker-image.tar
          else
            echo "Building Docker image"
            docker build -t swift-al2023:6.3 -f docker/Dockerfile.al2023-swift .
            docker save swift-al2023:6.3 > /tmp/docker-image.tar
          fi

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-build-${{ hashFiles('**/Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            swift-build-${{ hashFiles('**/Package.resolved') }}-
            swift-build-

      - name: Build Lambda zip
        run: swift package --allow-network-connections docker archive --base-docker-image swift-al2023:6.3 --disable-docker-image-update

      - name: Bundle OpenSSL libs from build image
        run: |
          mkdir -p /tmp/ssl-libs
          docker run --rm -v /tmp/ssl-libs:/out swift-al2023:6.3 \
            bash -c 'cp /lib64/libcrypto.so.3 /lib64/libssl.so.3 /out/'

          OUTPUT_BASE=".build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager"
          for zip_file in "$OUTPUT_BASE"/*/*.zip; do
            handler_dir=$(dirname "$zip_file")
            mkdir -p "$handler_dir/lib"
            cp /tmp/ssl-libs/* "$handler_dir/lib/"
            (cd "$handler_dir" && zip -u "$(basename "$zip_file")" lib/*)
          done
          echo "Bundled OpenSSL libs into $(ls "$OUTPUT_BASE"/*/*.zip | wc -l) zips"

      - name: Install SAM CLI
        uses: ./.github/actions/setup-sam-portable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy with SAM
        run: |
          sam package \
            --template-file activity-app/template.yaml \
            --output-template-file packaged.yaml \
            --resolve-s3 \
            --region $AWS_REGION

          sam deploy \
            --template-file packaged.yaml \
            --stack-name "activity-app-prod" \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region $AWS_REGION \
            --parameter-overrides \
              Stage=prod \
              EnvironmentStackName=activity-environment-prod \
              BootstrapStackName=activity-bootstrap \
              ServerDomain=${{ vars.SERVER_DOMAIN }} \
              HandleDomain=${{ vars.HANDLE_DOMAIN }} \
              ProxyDistributionId=${{ vars.PROXY_DISTRIBUTION_ID }} \
              ActivityDistributionId=${{ vars.ACTIVITY_DISTRIBUTION_ID_PROD }} \
              ClientApiDomain=${{ vars.CLIENT_API_DOMAIN_PROD }} \
              "InstanceTitle=${{ vars.INSTANCE_TITLE || 'FederatedActivityPublisher' }}" \
              "InstanceDescription=${{ vars.INSTANCE_DESCRIPTION || 'A serverless ActivityPub server powered by FederatedActivityPublisher.' }}" \
              "SourceUrl=${{ vars.SOURCE_URL || 'https://github.com/happitec-inc/FederatedActivityPublisher' }}"

      - name: Upload frontend assets
        run: |
          MEDIA_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "activity-environment-prod" \
            --query "Stacks[0].Outputs[?OutputKey=='MediaBucketName'].OutputValue" \
            --output text \
            --region $AWS_REGION 2>/dev/null || echo "")
          if [ -n "$MEDIA_BUCKET" ] && [ "$MEDIA_BUCKET" != "None" ]; then
            aws s3 sync frontend/ "s3://$MEDIA_BUCKET/media/frontend/" \
              --cache-control "public, max-age=31536000, immutable"
            echo "Uploaded frontend assets to s3://$MEDIA_BUCKET/media/frontend/"
          else
            echo "Warning: Could not determine media bucket name, skipping frontend upload"
          fi

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "activity-app-prod" \
            --query "Stacks[0].Outputs" \
            --output table \
            --region $AWS_REGION >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
