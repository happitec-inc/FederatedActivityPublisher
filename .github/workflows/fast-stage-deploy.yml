name: Fast Stage Deploy
run-name: "Fast Stage Deploy"

on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fast-deploy:
    runs-on: linux_large
    env:
      STAGE: stage
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: false

      - name: Detect changed targets
        id: changes
        run: |
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})

          # If template or package files changed, let the full pipeline handle it
          if echo "$CHANGED" | grep -qE '^(Package\.(swift|resolved)|docker/|activity-app/)'; then
            echo "Infrastructure files changed, deferring to full pipeline"
            echo "targets=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TARGETS=$(echo "$CHANGED" | bash scripts/detect-changed-targets.sh)

          if [ "$TARGETS" = "none" ] || [ "$TARGETS" = "all" ]; then
            echo "targets=skip" >> "$GITHUB_OUTPUT"
            echo "Skipping fast deploy (targets=$TARGETS)"
            exit 0
          fi

          echo "targets<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TARGETS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Changed targets: $TARGETS"

      - name: Install Docker
        if: steps.changes.outputs.targets != 'skip'
        run: |
          if command -v docker &>/dev/null; then
            echo "Docker already installed"
          else
            curl -fsSL https://get.docker.com | sudo sh
          fi
          sudo chmod 666 /var/run/docker.sock

      - name: Cache Docker image
        if: steps.changes.outputs.targets != 'skip'
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image.tar
          key: docker-al2023-swift-${{ hashFiles('docker/Dockerfile.al2023-swift') }}

      - name: Load or build AL2023 Swift Docker image
        if: steps.changes.outputs.targets != 'skip'
        run: |
          if [ -f /tmp/docker-image.tar ]; then
            echo "Loading cached Docker image"
            docker load < /tmp/docker-image.tar
          else
            echo "Building Docker image"
            docker build -t swift-al2023:6.3 -f docker/Dockerfile.al2023-swift .
            docker save swift-al2023:6.3 > /tmp/docker-image.tar
          fi

      - name: Cache Swift build artifacts
        if: steps.changes.outputs.targets != 'skip'
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-build-${{ hashFiles('Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            swift-build-${{ hashFiles('Package.resolved') }}-
            swift-build-

      - name: Build changed targets in Docker
        if: steps.changes.outputs.targets != 'skip'
        run: |
          TARGETS="${{ steps.changes.outputs.targets }}"
          TARGETS_ARGS=$(echo "$TARGETS" | tr '\n' ' ')
          echo "Building: $TARGETS_ARGS"
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            swift-al2023:6.3 \
            bash scripts/build-selective.sh $TARGETS_ARGS

      - name: Install AWS CLI
        if: steps.changes.outputs.targets != 'skip'
        run: |
          if ! command -v aws &>/dev/null; then
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o /tmp/awscliv2.zip
            else
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            fi
            sudo apt-get install -y unzip 2>/dev/null || true
            unzip -q /tmp/awscliv2.zip -d /tmp && sudo /tmp/aws/install
            rm -rf /tmp/awscliv2.zip /tmp/aws
          fi
          aws --version

      - name: Configure AWS credentials
        if: steps.changes.outputs.targets != 'skip'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Lambda functions directly
        if: steps.changes.outputs.targets != 'skip'
        run: |
          # Get the nested functions stack name
          FUNCTIONS_STACK=$(aws cloudformation describe-stack-resource \
            --stack-name "activity-app-stage" \
            --logical-resource-id FunctionsStack \
            --query "StackResourceDetail.PhysicalResourceId" \
            --output text --region us-east-1)
          # Extract just the stack name from the ARN
          FUNCTIONS_STACK_NAME=$(echo "$FUNCTIONS_STACK" | sed 's|.*/stack/||;s|/.*||')

          # Build a map of logical ID -> physical function name
          FUNCTION_MAP=$(aws cloudformation list-stack-resources \
            --stack-name "$FUNCTIONS_STACK_NAME" \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function'].[LogicalResourceId,PhysicalResourceId]" \
            --output text --region us-east-1)

          TARGETS="${{ steps.changes.outputs.targets }}"
          OUTPUT_BASE=".build/plugins/AWSLambdaPackager/outputs/AWSLambdaPackager"

          while IFS= read -r TARGET; do
            [ -z "$TARGET" ] && continue
            # Map handler name to CFN logical ID: e.g. PostHandler -> PostFunction
            LOGICAL_ID="${TARGET/Handler/Function}"
            FUNCTION_NAME=$(echo "$FUNCTION_MAP" | grep "^${LOGICAL_ID}" | awk '{print $2}')

            if [ -z "$FUNCTION_NAME" ]; then
              echo "WARNING: Could not find Lambda for $TARGET (logical: $LOGICAL_ID)"
              continue
            fi

            ZIP_PATH="$OUTPUT_BASE/$TARGET/$TARGET.zip"
            if [ ! -f "$ZIP_PATH" ]; then
              echo "WARNING: No zip found at $ZIP_PATH"
              continue
            fi

            echo "Updating $FUNCTION_NAME from $ZIP_PATH..."
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file "fileb://$ZIP_PATH" \
              --region us-east-1 \
              --output text --query 'FunctionName'
          done <<< "$TARGETS"

