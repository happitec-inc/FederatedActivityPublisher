name: Integration Tests
run-name: "Integration Tests (${{ github.event.workflow_run.outputs.stage || inputs.stage || 'stage' }})"

on:
  workflow_run:
    workflows: ["Deploy App Stack"]
    types: [completed]
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to test against"
        required: true
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: read
  actions: read

jobs:
  test:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Determine stage
        id: set-stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stage=${{ inputs.stage }}" >> "$GITHUB_OUTPUT"
          else
            # Infer from the deploy workflow's run name which contains the stage
            DISPLAY='${{ github.event.workflow_run.display_title }}'
            if echo "$DISPLAY" | grep -q '(prod)'; then
              echo "stage=prod" >> "$GITHUB_OUTPUT"
            else
              echo "stage=stage" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Swift dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils gcc g++ libc6-dev libcurl4-openssl-dev libssl-dev libxml2-dev pkg-config

      - name: Install Swift
        run: |
          if swift --version 2>/dev/null | grep -q "6.3"; then
            echo "Swift 6.3 already installed"
          else
            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404-aarch64/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04-aarch64.tar.gz"
            else
              SWIFT_URL="https://download.swift.org/swift-6.3-release/ubuntu2404/swift-6.3-RELEASE/swift-6.3-RELEASE-ubuntu24.04.tar.gz"
            fi
            curl -fsSL "$SWIFT_URL" | sudo tar xz --strip-components=2 -C /usr/local
          fi
          swift --version

      - name: Fix Swift 6.3 ICU header conflict
        run: |
          # Swift 6.3 bundles _FoundationICU (ICU 76+) with newer UErrorCode enums
          # than system ICU 74. Symlink Swift's headers over system ICU headers.
          SWIFT_ICU_DIR=$(find /usr/local/lib/swift -name '_foundation_unicode' -type d | head -1)
          if [ -n "$SWIFT_ICU_DIR" ]; then
            sudo rm -rf /usr/include/unicode
            ARCH_INCLUDE="/usr/include/$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || echo '')"
            [ -d "$ARCH_INCLUDE/unicode" ] && sudo rm -rf "$ARCH_INCLUDE/unicode"
            sudo ln -sf "$SWIFT_ICU_DIR" /usr/include/unicode
            echo "Replaced system ICU headers with Swift's bundled ICU from $SWIFT_ICU_DIR"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get stack outputs
        id: stack
        env:
          STAGE: ${{ steps.set-stage.outputs.stage }}
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${STAGE}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text --region us-east-1)
          CLIENT_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${STAGE}" \
            --query "Stacks[0].Outputs[?OutputKey=='ClientApiUrl'].OutputValue" \
            --output text --region us-east-1)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "client_api_url=$CLIENT_API_URL" >> "$GITHUB_OUTPUT"

      - name: Get bearer token from SSM
        id: token
        env:
          STAGE: ${{ steps.set-stage.outputs.stage }}
        run: |
          TOKEN_VALUE=$(aws ssm get-parameter \
            --name "/activity/${STAGE}/keys/client-token" \
            --with-decryption --query "Parameter.Value" --output text --region us-east-1 2>/dev/null || echo "")
          if [ -n "$TOKEN_VALUE" ]; then
            BEARER=$(echo "$TOKEN_VALUE" | cut -d: -f2)
            echo "bearer=$BEARER" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests
        env:
          TEST_API_URL: ${{ steps.stack.outputs.api_url }}
          TEST_CLIENT_API_URL: ${{ steps.stack.outputs.client_api_url }}
          TEST_BEARER_TOKEN: ${{ steps.token.outputs.bearer }}
          TEST_HANDLE_DOMAIN: ${{ steps.set-stage.outputs.stage == 'prod' && vars.HANDLE_DOMAIN || format('{0}.{1}', steps.set-stage.outputs.stage, vars.HANDLE_DOMAIN) }}
          LD_LIBRARY_PATH: /usr/local/lib/swift/linux
        run: swift test --filter IntegrationTests
