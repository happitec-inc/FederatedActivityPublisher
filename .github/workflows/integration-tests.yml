name: Integration Tests
run-name: "Integration Tests (${{ github.event.workflow_run.outputs.stage || inputs.stage || 'stage' }})"

on:
  workflow_run:
    workflows: ["Deploy App Stack"]
    types: [completed]
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to test against"
        required: true
        type: choice
        options:
          - stage
          - prod

permissions:
  contents: read
  actions: read

jobs:
  test:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Determine stage
        id: set-stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stage=${{ inputs.stage }}" >> "$GITHUB_OUTPUT"
          else
            # Infer from the deploy workflow's run name which contains the stage
            DISPLAY='${{ github.event.workflow_run.display_title }}'
            if echo "$DISPLAY" | grep -q '(prod)'; then
              echo "stage=prod" >> "$GITHUB_OUTPUT"
            else
              echo "stage=stage" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Docker
        run: |
          if command -v docker &>/dev/null; then
            echo "Docker already installed"
          else
            curl -fsSL https://get.docker.com | sudo sh
          fi
          sudo chmod 666 /var/run/docker.sock
          docker --version

      - name: Cache Docker image
        uses: actions/cache@v4
        with:
          path: /tmp/docker-image.tar
          key: docker-al2023-swift-${{ hashFiles('docker/Dockerfile.al2023-swift') }}

      - name: Load or build AL2023 Swift Docker image
        run: |
          if [ -f /tmp/docker-image.tar ]; then
            echo "Loading cached Docker image"
            docker load < /tmp/docker-image.tar
          else
            echo "Building Docker image"
            docker build -t swift-al2023:6.3 -f docker/Dockerfile.al2023-swift .
            docker save swift-al2023:6.3 > /tmp/docker-image.tar
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get stack outputs
        id: stack
        env:
          STAGE: ${{ steps.set-stage.outputs.stage }}
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${STAGE}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text --region us-east-1)
          CLIENT_API_URL=$(aws cloudformation describe-stacks \
            --stack-name "activity-app-${STAGE}" \
            --query "Stacks[0].Outputs[?OutputKey=='ClientApiUrl'].OutputValue" \
            --output text --region us-east-1)
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "client_api_url=$CLIENT_API_URL" >> "$GITHUB_OUTPUT"

      - name: Get bearer token from SSM
        id: token
        env:
          STAGE: ${{ steps.set-stage.outputs.stage }}
        run: |
          TOKEN_VALUE=$(aws ssm get-parameter \
            --name "/activity/${STAGE}/keys/client-token" \
            --with-decryption --query "Parameter.Value" --output text --region us-east-1 2>/dev/null || echo "")
          if [ -n "$TOKEN_VALUE" ]; then
            BEARER=$(echo "$TOKEN_VALUE" | cut -d: -f2)
            echo "bearer=$BEARER" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests in Docker
        env:
          TEST_API_URL: ${{ steps.stack.outputs.api_url }}
          TEST_CLIENT_API_URL: ${{ steps.stack.outputs.client_api_url }}
          TEST_BEARER_TOKEN: ${{ steps.token.outputs.bearer }}
          TEST_HANDLE_DOMAIN: ${{ steps.set-stage.outputs.stage == 'prod' && vars.HANDLE_DOMAIN || format('{0}.{1}', steps.set-stage.outputs.stage, vars.HANDLE_DOMAIN) }}
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            -w /workspace \
            -e TEST_API_URL \
            -e TEST_CLIENT_API_URL \
            -e TEST_BEARER_TOKEN \
            -e TEST_HANDLE_DOMAIN \
            swift-al2023:6.3 \
            swift test --filter IntegrationTests
