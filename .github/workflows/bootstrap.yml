name: Deploy Bootstrap Stack

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ${{ vars.RUNNER_LABELS_LINUX && fromJSON(vars.RUNNER_LABELS_LINUX) || 'ubuntu-latest' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install SAM CLI
        uses: ./.github/actions/setup-sam-portable

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: SAM build
        run: sam build --template-file activity-bootstrap/template.yaml

      - name: SAM deploy
        run: |
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --config-file ${{ github.workspace }}/activity-bootstrap/samconfig.toml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Print stack outputs
        run: |
          echo "## Stack Outputs" >> $GITHUB_STEP_SUMMARY
          aws cloudformation describe-stacks \
            --stack-name activity-bootstrap \
            --query "Stacks[0].Outputs[].[OutputKey, OutputValue]" \
            --output table \
            --region us-east-1 >> $GITHUB_STEP_SUMMARY
