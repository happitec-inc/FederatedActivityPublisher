openapi: 3.1.0
info:
  title: FederatedActivityPublisher
  description: Serverless ActivityPub server. A project by Happitec.
  version: 0.1.0
  license:
    name: MIT

servers:
  - url: https://api.example.com
    description: Production (federation) — set SERVER_DOMAIN repo variable
  - url: https://stage.api.example.com
    description: Stage (federation)
  - url: https://client.api.example.com
    description: Production (client API)
  - url: https://client-stage.api.example.com
    description: Stage (client API)

security: []  # Federation endpoints are public by default; client endpoints override with bearerAuth

paths:
  # ── Federation — Discovery ──────────────────────────

  /.well-known/nodeinfo:
    get:
      operationId: nodeInfoDiscovery
      summary: NodeInfo discovery document
      tags: [federation]
      description: |
        Returns a JRD with a link to `/nodeinfo/2.1`. Mastodon 4.x and GoToSocial
        query this for federation health checks.
      responses:
        "200":
          description: NodeInfo discovery links
          content:
            application/json:
              schema:
                type: object
                required: [links]
                properties:
                  links:
                    type: array
                    items:
                      type: object
                      required: [rel, href]
                      properties:
                        rel:
                          type: string
                          example: "http://nodeinfo.diaspora.software/ns/schema/2.1"
                        href:
                          type: string
                          format: uri
                          example: "https://api.example.com/nodeinfo/2.1"

  /nodeinfo/2.1:
    get:
      operationId: nodeInfo
      summary: NodeInfo 2.1 server metadata
      tags: [federation]
      description: |
        Server metadata: software name/version, protocols, user/status counts,
        open registrations (false). Mostly static.
      responses:
        "200":
          description: NodeInfo 2.1 document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeInfo"

  /.well-known/webfinger:
    get:
      operationId: webfinger
      summary: WebFinger resource discovery
      tags: [federation]
      description: |
        Resolves an `acct:` URI to an ActivityPub actor.
        Required for Mastodon federation compatibility.
        Handle domain is set via HANDLE_DOMAIN repo variable; actor URLs point to SERVER_DOMAIN.
      parameters:
        - name: resource
          in: query
          required: true
          schema:
            type: string
            example: "acct:myactor@example.com"
          description: "Must be in format `acct:{username}@{handle_domain}`"
      responses:
        "200":
          description: WebFinger JRD response
          content:
            application/jrd+json:
              schema:
                $ref: "#/components/schemas/WebFingerResponse"
        "400":
          description: Missing or malformed resource parameter
        "404":
          description: Unknown resource

  # ── Federation — Actor ──────────────────────────

  /users/{username}:
    get:
      operationId: getActor
      summary: Fetch ActivityPub actor profile
      tags: [federation]
      description: |
        Returns the full Actor document (JSON-LD) with public key, endpoints, and metadata.
        Content-negotiates: returns JSON-LD for ActivityPub clients, 302 redirect to
        `/@{username}` for browser requests (`Accept: text/html`).
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: Actor document (JSON-LD)
          content:
            application/activity+json:
              schema:
                $ref: "#/components/schemas/Actor"
        "302":
          description: Redirect to human-readable profile (browser request)
        "404":
          description: Unknown actor

  /users/{username}/inbox:
    post:
      operationId: receiveActivity
      summary: Receive an ActivityPub activity
      tags: [federation]
      description: |
        Federation inbox. Receives Follow, Accept, Reject, Undo, Like, Announce,
        Create (replies), Delete, Update, Flag, QuoteRequest, Block, Move, Add,
        and Remove activities. Unrecognized types are logged and return 202.
        Requires valid HTTP Signature (Cavage draft or RFC 9421).
      parameters:
        - $ref: "#/components/parameters/username"
      requestBody:
        required: true
        content:
          application/activity+json:
            schema:
              $ref: "#/components/schemas/Activity"
          application/ld+json:
            schema:
              $ref: "#/components/schemas/Activity"
      responses:
        "202":
          description: Activity accepted
        "401":
          description: Invalid or missing HTTP Signature
        "404":
          description: Unknown actor

  # ── Federation — Collections ──────────────────────────

  /users/{username}/outbox:
    get:
      operationId: getOutbox
      summary: Fetch public statuses
      tags: [federation]
      description: |
        Returns an OrderedCollection of the actor's public posts, newest first.
        Root collection returns totalItems + first/last URIs only (no orderedItems).
        Pages (page=true) return orderedItems + partOf/next/prev.
      parameters:
        - $ref: "#/components/parameters/username"
        - name: page
          in: query
          schema:
            type: boolean
        - name: min_id
          in: query
          schema:
            type: string
        - name: max_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Ordered collection of activities
          content:
            application/activity+json:
              schema:
                $ref: "#/components/schemas/OrderedCollection"
        "404":
          description: Unknown actor

  /users/{username}/followers:
    get:
      operationId: getFollowers
      summary: Fetch follower collection
      tags: [federation]
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: Ordered collection of follower URIs
          content:
            application/activity+json:
              schema:
                $ref: "#/components/schemas/OrderedCollection"
        "404":
          description: Unknown actor

  /users/{username}/following:
    get:
      operationId: getFollowing
      summary: Fetch following collection
      tags: [federation]
      description: Returns an empty OrderedCollection. Brand accounts don't follow others.
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: Ordered collection (always empty for service accounts)
          content:
            application/activity+json:
              schema:
                $ref: "#/components/schemas/OrderedCollection"
        "404":
          description: Unknown actor

  /users/{username}/collections/featured:
    get:
      operationId: getFeatured
      summary: Fetch pinned/featured statuses
      tags: [federation]
      description: |
        Returns an OrderedCollection of pinned statuses (with orderedItems).
        Empty for MVP. Must exist to avoid 404 when remote servers fetch it.
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: Ordered collection of pinned statuses
          content:
            application/activity+json:
              schema:
                $ref: "#/components/schemas/OrderedCollection"
        "404":
          description: Unknown actor

  /users/{username}/collections/tags:
    get:
      operationId: getFeaturedTags
      summary: Fetch featured hashtags
      tags: [federation]
      description: |
        Returns an OrderedCollection of featured hashtags (with orderedItems).
        Empty for MVP.
      parameters:
        - $ref: "#/components/parameters/username"
      responses:
        "200":
          description: Ordered collection of featured hashtags
          content:
            application/activity+json:
              schema:
                $ref: "#/components/schemas/OrderedCollection"
        "404":
          description: Unknown actor

  # ── Federation — Objects ──────────────────────────

  /users/{username}/statuses/{id}:
    get:
      operationId: getObject
      summary: Fetch a single status/Note by ID
      tags: [federation]
      description: |
        Object resolution endpoint. Remote servers fetch Note objects by URI
        for reply threading, link previews, and quoting. Returns 410 if deleted (tombstone).
      parameters:
        - $ref: "#/components/parameters/username"
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Note object (JSON-LD)
          content:
            application/activity+json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Unknown status
        "410":
          description: Status was deleted (tombstone)

  # ── Instance ────────────────────────────────────

  /api/v1/instance:
    get:
      operationId: getInstanceV1
      summary: View server information (v1, deprecated)
      tags: [instance]
      description: |
        Returns the v1 instance entity. Deprecated in favour of v2.
        Kept for legacy client compatibility.
      responses:
        "200":
          description: V1 Instance entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1Instance"

  /api/v2/instance:
    get:
      operationId: getInstanceV2
      summary: View server information (v2)
      tags: [instance]
      description: |
        Returns the v2 instance entity with configuration, registrations,
        api_versions, and contact information.
      responses:
        "200":
          description: V2 Instance entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V2Instance"

  # ── Client (authoring) ───────────────────────────

  /api/v1/accounts/verify_credentials:
    get:
      operationId: verifyCredentials
      summary: Fetch the authenticated account's profile (with raw source values)
      tags: [client]
      description: |
        Returns the authenticated account entity including the `source` object
        with raw (unrendered) bio and field values. Used by clients to pre-populate
        profile editing forms.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated account with source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialAccount"
        "401":
          description: Invalid or missing auth

  /api/v1/accounts/update_credentials:
    patch:
      operationId: updateCredentials
      summary: Update account profile
      tags: [client]
      description: |
        Update the authenticated user's display name, bio, avatar, header,
        and profile fields. Accepts multipart/form-data.
        Fans out an Update activity to all followers.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateCredentialsRequest"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          description: Invalid or missing auth
        "413":
          description: Image too large
        "422":
          description: Validation error

  /api/v1/statuses:
    post:
      operationId: createStatus
      summary: Post a new status
      tags: [client]
      description: |
        Creates a status and fans out delivery to all followers.
        Auth required. Mastodon-compatible subset of POST /api/v1/statuses.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStatusRequest"
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/CreateStatusRequest"
      responses:
        "200":
          description: Status created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
        "401":
          description: Invalid or missing auth
        "422":
          description: Validation error

  /api/v2/media:
    post:
      operationId: uploadMedia
      summary: Upload media attachment
      tags: [client]
      description: |
        Upload an image or video. Media flows through the Lambda to S3 —
        no presigned URLs, no direct bucket access.
        Returns a media ID for use in createStatus.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The media file
                description:
                  type: string
                  description: Alt text
                focus:
                  type: string
                  description: "Focal point as x,y (-1.0 to 1.0)"
      responses:
        "200":
          description: |
            Media attachment created. Processing is fully synchronous: the file is
            uploaded to S3 and the attachment is returned immediately with a populated
            `url` (and a `preview_url` equal to it). There is no async/poll branch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAttachment"
        "401":
          description: Invalid or missing auth
        "413":
          description: File too large
        "422":
          description: Unsupported media type

  # ── Auth (passkey WebAuthn) ──────────────────────────

  /api/internal/auth/challenge:
    post:
      operationId: createAuthChallenge
      summary: Generate WebAuthn assertion challenge
      tags: [auth]
      description: |
        Returns a random challenge for WebAuthn authentication.
        The challenge is stored in DynamoDB with a 5-minute TTL.
      responses:
        "200":
          description: Authentication challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthChallenge"

  /api/internal/auth/verify:
    post:
      operationId: verifyAuth
      summary: Verify WebAuthn assertion and issue session
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyRequest"
      responses:
        "200":
          description: Authentication successful (Set-Cookie header included)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthVerifyResponse"
        "401":
          description: Invalid credential or challenge

  /api/internal/passkeys/register-challenge:
    post:
      operationId: createRegistrationChallenge
      summary: Generate WebAuthn creation challenge
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Registration challenge (WebAuthn creation options)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationChallenge"
        "401":
          description: Invalid or expired registration token

  /api/internal/passkeys/register:
    post:
      operationId: registerPasskey
      summary: Store new passkey credential
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPasskeyRequest"
      responses:
        "200":
          description: Passkey registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Invalid token, challenge, or credential

  /compose:
    get:
      operationId: getComposePage
      summary: Compose page (requires session)
      tags: [web]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Compose page HTML
          content:
            text/html:
              schema:
                type: string
        "302":
          description: Redirect to /auth/login (no valid session)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token. MVP uses per-actor shared secret stored in
        SSM Parameter Store. OAuth2 planned for Phase 6.
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: JWT session token issued after passkey authentication

  parameters:
    username:
      name: username
      in: path
      required: true
      schema:
        type: string
        example: myactor

  schemas:
    WebFingerResponse:
      type: object
      required: [subject, links]
      properties:
        subject:
          type: string
          example: "acct:myactor@example.com"
        aliases:
          type: array
          items:
            type: string
        links:
          type: array
          items:
            $ref: "#/components/schemas/WebFingerLink"

    WebFingerLink:
      type: object
      required: [rel]
      properties:
        rel:
          type: string
        type:
          type: string
        href:
          type: string
          format: uri
        template:
          type: string
          description: URI template (used for subscribe rel)

    Actor:
      type: object
      description: ActivityPub Actor (Person or Service)
      required: [id, type, preferredUsername, inbox, outbox, publicKey]
      properties:
        "@context":
          oneOf:
            - type: string
            - type: array
        id:
          type: string
          format: uri
        type:
          type: string
          enum: [Person, Service]
        preferredUsername:
          type: string
        name:
          type: string
        summary:
          type: string
        inbox:
          type: string
          format: uri
        outbox:
          type: string
          format: uri
        followers:
          type: string
          format: uri
        following:
          type: string
          format: uri
        url:
          type: string
          format: uri
        icon:
          type: object
          properties:
            type:
              type: string
            url:
              type: string
              format: uri
        publicKey:
          type: object
          required: [id, owner, publicKeyPem]
          properties:
            id:
              type: string
            owner:
              type: string
            publicKeyPem:
              type: string
        discoverable:
          type: boolean
        indexable:
          type: boolean
        manuallyApprovesFollowers:
          type: boolean
        published:
          type: string
          format: date-time
        featured:
          type: string
          format: uri
        featuredTags:
          type: string
          format: uri
        attributionDomains:
          type: array
          items:
            type: string
        attachment:
          type: array
          description: Profile metadata fields (PropertyValue)
          items:
            type: object
            properties:
              type:
                type: string
                example: PropertyValue
              name:
                type: string
              value:
                type: string
                description: HTML value (may contain links)

    Activity:
      type: object
      description: Generic ActivityPub activity envelope
      properties:
        "@context":
          oneOf:
            - type: string
            - type: array
        id:
          type: string
          format: uri
        type:
          type: string
          description: "Activity type: Follow, Accept, Reject, Undo, Like, Announce, Create, Delete, Update, Flag, QuoteRequest, Block, Move, Add, Remove"
        actor:
          type: string
          format: uri
        object:
          description: The object of the activity (URI or inline object)
          oneOf:
            - type: string
            - type: object

    CreateActivity:
      type: object
      description: |
        A Create activity wrapping a Note. This is the concrete shape of each item in the
        outbox page's orderedItems (built by buildCreateActivityJSON). The Create envelope
        carries only @context, id, type, actor, published, to, cc, and the inline Note object.
      required: ["@context", id, type, actor, object]
      properties:
        "@context":
          type: string
          description: Always the bare ActivityStreams context string on the Create envelope.
        id:
          type: string
          format: uri
          description: "Activity URI: {status URI}/activity"
        type:
          type: string
          enum: [Create]
        actor:
          type: string
          format: uri
        published:
          type: string
          format: date-time
        to:
          type: array
          items:
            type: string
        cc:
          type: array
          items:
            type: string
        object:
          $ref: "#/components/schemas/Note"

    OrderedCollection:
      type: object
      description: |
        Root collection (type=OrderedCollection): has totalItems, first, last — no orderedItems.
        Page (type=OrderedCollectionPage): has orderedItems, partOf, next, prev — no first/last,
        no totalItems.
        Followers/following return only the root collection (empty for service accounts).
        Featured/featuredTags collections include orderedItems (empty array for MVP).
        The outbox page (GET /users/{username}/outbox?page=true) is the only collection that
        populates orderedItems with content: each item is a Create activity wrapping a Note.
      required: ["@context", id, type]
      properties:
        "@context":
          type: string
        id:
          type: string
          format: uri
        type:
          type: string
          enum: [OrderedCollection, OrderedCollectionPage]
        totalItems:
          type: integer
          description: Root collection only — total item count. Absent on pages.
        first:
          type: string
          format: uri
          description: Root collection only — URI of first page
        last:
          type: string
          format: uri
          description: Root collection only — URI of last page
        partOf:
          type: string
          format: uri
          description: Page only — URI of the parent collection
        orderedItems:
          type: array
          description: |
            Page only — items on this page (also an empty array on featured/featuredTags).
            On the outbox page each item is a Create activity wrapping a Note.
          items:
            $ref: "#/components/schemas/CreateActivity"
        next:
          type: string
          format: uri
        prev:
          type: string
          format: uri

    NodeInfo:
      type: object
      required: [version, software, protocols, openRegistrations, usage]
      properties:
        version:
          type: string
          example: "2.1"
        software:
          type: object
          required: [name, version]
          properties:
            name:
              type: string
              example: "federated-activity-publisher"
            version:
              type: string
              example: "0.1.0"
        protocols:
          type: array
          items:
            type: string
          example: ["activitypub"]
        services:
          type: object
          properties:
            inbound:
              type: array
              items:
                type: string
            outbound:
              type: array
              items:
                type: string
        openRegistrations:
          type: boolean
          example: false
        usage:
          type: object
          properties:
            users:
              type: object
              properties:
                total:
                  type: integer
                activeMonth:
                  type: integer
                activeHalfyear:
                  type: integer
            localPosts:
              type: integer
        metadata:
          type: object

    CreateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: Plain text content (converted to HTML by the server)
        media_ids:
          type: array
          items:
            type: string
          description: Media attachment IDs from /api/v2/media
        sensitive:
          type: boolean
          default: false
        spoiler_text:
          type: string
          description: Content warning text
        visibility:
          type: string
          enum: [public, unlisted, private, direct]
          default: public
        language:
          type: string
          description: ISO 639-1 language code
          example: en
        in_reply_to_id:
          type: string
          description: ID of status being replied to
        quoted_status_id:
          type: string
          description: ID of status being quoted (Mastodon 4.5+, FEP-044f)
        quote_approval_policy:
          type: string
          enum: [public, followers, nobody]
          description: Who can quote this status

    Status:
      type: object
      description: |
        Status entity returned by POST /api/v1/statuses (built by buildStatusResponse).
        Every field below is always present in the response; nullable fields are emitted
        as JSON null when unset. This is a Mastodon-compatible subset — it does NOT include
        an `account`, an embedded `quote` status, or a Mastodon `quote_approval` object.
        Quote state is conveyed via the flat `quoted_status_uri` and `quote_approval_state`.
      required:
        - id
        - created_at
        - visibility
        - sensitive
        - spoiler_text
        - content
        - url
        - uri
        - language
        - in_reply_to_id
        - favourites_count
        - reblogs_count
        - replies_count
        - quotes_count
        - quoted_status_uri
        - quote_approval_state
        - media_attachments
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        visibility:
          type: string
          enum: [public, unlisted, private, direct]
        sensitive:
          type: boolean
        spoiler_text:
          oneOf:
            - type: string
            - type: "null"
          description: Content warning text, or null when none is set
        content:
          type: string
          description: HTML content of the status
        url:
          type: string
          format: uri
        uri:
          type: string
          format: uri
        language:
          oneOf:
            - type: string
            - type: "null"
          description: ISO 639-1 language code, or null when unset
        in_reply_to_id:
          oneOf:
            - type: string
            - type: "null"
          description: ID of the status being replied to, or null
        favourites_count:
          type: integer
        reblogs_count:
          type: integer
        replies_count:
          type: integer
        quotes_count:
          type: integer
          description: Accepted quotes count (Mastodon 4.5+)
        quoted_status_uri:
          oneOf:
            - type: string
              format: uri
            - type: "null"
          description: URI of the quoted status, or null when this status quotes nothing
        quote_approval_state:
          oneOf:
            - type: string
            - type: "null"
          description: |
            Quote approval state for the quoted status (e.g. "accepted", "pending"),
            or null when not applicable (no quote, or a local-to-local quote).
        media_attachments:
          type: array
          items:
            $ref: "#/components/schemas/MediaAttachment"

    MediaAttachment:
      type: object
      description: |
        Media attachment entity. Two endpoints emit this shape:
          - POST /api/v2/media returns {id, type, url, preview_url, description, blurhash}
            (synchronous; url is always present, preview_url equals url, blurhash is always null).
          - Status.media_attachments returns {id, type, url, description, blurhash}
            (no preview_url, no meta).
        id, type, and url are always present and non-null. preview_url is present only on the
        media-upload response. description and blurhash are nullable. The server does not emit
        gifv, a nullable url, or a meta object.
      required: [id, type, url, description, blurhash]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [image, video, audio, unknown]
        url:
          type: string
          format: uri
        preview_url:
          type: string
          format: uri
          description: Present only on the POST /api/v2/media response; equals url.
        description:
          oneOf:
            - type: string
            - type: "null"
          description: Alt text, or null when none was provided
        blurhash:
          oneOf:
            - type: string
            - type: "null"
          description: Blurhash string, or null (always null on the upload response)

    # ── Instance entities ──────────────────────────

    V1Instance:
      type: object
      description: Legacy v1 instance entity (GET /api/v1/instance)
      properties:
        uri:
          type: string
          description: The domain of the instance
        title:
          type: string
        short_description:
          type: string
        description:
          type: string
        email:
          type: string
        version:
          type: string
        urls:
          type: object
          properties:
            streaming_api:
              type: string
        stats:
          type: object
          properties:
            user_count:
              type: integer
            status_count:
              type: integer
            domain_count:
              type: integer
        thumbnail:
          oneOf:
            - type: string
              format: uri
            - type: "null"
        languages:
          type: array
          items:
            type: string
        registrations:
          type: boolean
        approval_required:
          type: boolean
        invites_enabled:
          type: boolean
        configuration:
          $ref: "#/components/schemas/V1InstanceConfiguration"
        contact_account:
          oneOf:
            - $ref: "#/components/schemas/Account"
            - type: "null"
        rules:
          type: array
          items:
            type: object

    V1InstanceConfiguration:
      type: object
      properties:
        accounts:
          type: object
          properties:
            max_featured_tags:
              type: integer
        statuses:
          type: object
          properties:
            max_characters:
              type: integer
            max_media_attachments:
              type: integer
            characters_reserved_per_url:
              type: integer
        media_attachments:
          type: object
          properties:
            supported_mime_types:
              type: array
              items:
                type: string
            image_size_limit:
              type: integer
            image_matrix_limit:
              type: integer
        polls:
          type: object
          properties:
            max_options:
              type: integer
            max_characters_per_option:
              type: integer
            min_expiration:
              type: integer
            max_expiration:
              type: integer

    V2Instance:
      type: object
      description: V2 instance entity (GET /api/v2/instance)
      properties:
        domain:
          type: string
        title:
          type: string
        version:
          type: string
        source_url:
          type: string
          format: uri
        description:
          type: string
        usage:
          type: object
          properties:
            users:
              type: object
              properties:
                active_month:
                  type: integer
        thumbnail:
          oneOf:
            - type: string
              format: uri
            - type: "null"
        icon:
          type: array
          items:
            type: object
        languages:
          type: array
          items:
            type: string
        configuration:
          $ref: "#/components/schemas/V2InstanceConfiguration"
        registrations:
          type: object
          properties:
            enabled:
              type: boolean
            approval_required:
              type: boolean
            reason_required:
              type: boolean
            message:
              oneOf:
                - type: string
                - type: "null"
            url:
              oneOf:
                - type: string
                  format: uri
                - type: "null"
            min_age:
              oneOf:
                - type: integer
                - type: "null"
        api_versions:
          type: object
          properties:
            mastodon:
              type: integer
              description: Mastodon API compatibility level (>= 7 enables quote support)
        contact:
          type: object
          properties:
            email:
              type: string
            account:
              oneOf:
                - $ref: "#/components/schemas/Account"
                - type: "null"
        rules:
          type: array
          items:
            type: object

    V2InstanceConfiguration:
      type: object
      properties:
        urls:
          type: object
          description: Streaming and other endpoint URLs (empty for this server)
        accounts:
          type: object
          properties:
            max_featured_tags:
              type: integer
            max_pinned_statuses:
              type: integer
        statuses:
          type: object
          properties:
            max_characters:
              type: integer
            max_media_attachments:
              type: integer
            characters_reserved_per_url:
              type: integer
        media_attachments:
          type: object
          properties:
            supported_mime_types:
              type: array
              items:
                type: string
            image_size_limit:
              type: integer
        polls:
          type: object
          properties:
            max_options:
              type: integer
            max_characters_per_option:
              type: integer
            min_expiration:
              type: integer
            max_expiration:
              type: integer
        translation:
          type: object
          properties:
            enabled:
              type: boolean

    # ── Account / Profile entities ──────────────────

    Account:
      type: object
      description: Mastodon-compatible account entity
      properties:
        id:
          type: string
        username:
          type: string
        acct:
          type: string
        display_name:
          type: string
        note:
          type: string
          description: HTML bio
        url:
          type: string
          format: uri
        avatar:
          type: string
          format: uri
        avatar_static:
          type: string
          format: uri
        header:
          type: string
          format: uri
        header_static:
          type: string
          format: uri
        locked:
          type: boolean
        bot:
          type: boolean
        created_at:
          type: string
          format: date-time
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ProfileField"
        emojis:
          type: array
          items:
            type: object
        followers_count:
          type: integer
        following_count:
          type: integer
        statuses_count:
          type: integer

    ProfileField:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
          description: HTML value (may contain links)
        verified_at:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
          description: Timestamp of last successful rel=me verification

    CredentialAccount:
      type: object
      description: |
        Authenticated account entity returned by GET /api/v1/accounts/verify_credentials.
        Extends Account with a `source` object containing raw (unrendered) bio and field values
        for use by profile-editing clients.
      required: [id, username, display_name, note, source]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: string
        note:
          type: string
          description: HTML-rendered bio
        avatar:
          type: string
          format: uri
        header:
          type: string
          format: uri
        fields:
          type: array
          description: Rendered profile fields (HTML values, may contain links)
          items:
            $ref: "#/components/schemas/ProfileField"
        source:
          $ref: "#/components/schemas/Source"

    Source:
      type: object
      description: |
        Raw (unrendered) account source values. Used by profile-editing clients to
        pre-populate edit forms without having to reverse-render HTML.
      required: [note, fields]
      properties:
        note:
          type: string
          description: Raw plain-text bio (before HTML conversion)
        fields:
          type: array
          description: Raw profile fields (plain-text name/value pairs, before HTML conversion)
          items:
            type: object
            required: [name, value]
            properties:
              name:
                type: string
              value:
                type: string

    UpdateCredentialsRequest:
      type: object
      description: Multipart form data for updating account profile
      properties:
        display_name:
          type: string
          description: New display name
        note:
          type: string
          description: New bio (plain text, converted to HTML by server)
        avatar:
          type: string
          format: binary
          description: Avatar image (PNG, JPEG, or GIF, max 2 MB)
        header:
          type: string
          format: binary
          description: Header image (PNG, JPEG, or GIF, max 2 MB)
        fields_attributes[0][name]:
          type: string
        fields_attributes[0][value]:
          type: string
        fields_attributes[1][name]:
          type: string
        fields_attributes[1][value]:
          type: string
        fields_attributes[2][name]:
          type: string
        fields_attributes[2][value]:
          type: string
        fields_attributes[3][name]:
          type: string
        fields_attributes[3][value]:
          type: string

    # ── ActivityPub Note entity ────────────────────

    Note:
      type: object
      description: |
        ActivityPub Note object (JSON-LD). This is the concrete shape produced by
        buildNoteJSON and embedded as the `object` of each outbox Create activity.
        Includes Mastodon toot namespace extensions for quote support and media metadata.
        @context, id, type, attributedTo, content, url, published, to, cc, sensitive, and
        interactionPolicy are always present. summary, contentMap, quoteUri/_misskey_quote,
        attachment, and tag are conditionally emitted.
      required:
        - "@context"
        - id
        - type
        - attributedTo
        - content
        - url
        - published
        - to
        - cc
        - sensitive
        - interactionPolicy
      properties:
        "@context":
          oneOf:
            - type: string
            - type: array
        id:
          type: string
          format: uri
        type:
          type: string
          enum: [Note]
        attributedTo:
          type: string
          format: uri
        content:
          type: string
          description: HTML content
        url:
          type: string
          format: uri
        published:
          type: string
          format: date-time
        to:
          type: array
          items:
            type: string
        cc:
          type: array
          items:
            type: string
        sensitive:
          type: boolean
        summary:
          type: string
          description: Content warning text (emitted only when a content warning is set)
        contentMap:
          type: object
          description: Language-keyed content map (emitted only when a language is set)
          additionalProperties:
            type: string
        quoteUri:
          type: string
          format: uri
          description: URI of the quoted status (toot:quoteUri, emitted only when the quote is accepted)
        _misskey_quote:
          type: string
          format: uri
          description: Misskey/Calckey compatibility alias for quoteUri (emitted alongside quoteUri)
        attachment:
          type: array
          items:
            type: object
            required: [type, mediaType, url]
            properties:
              type:
                type: string
                enum: [Image, Video, Audio, Document]
              mediaType:
                type: string
              url:
                type: string
                format: uri
              name:
                type: string
                description: Alt text (emitted only when a description is set)
              blurhash:
                type: string
        tag:
          type: array
          items:
            type: object
            required: [type, name]
            properties:
              type:
                type: string
              name:
                type: string
              href:
                type: string
                format: uri
        interactionPolicy:
          type: object
          description: |
            Quote interaction policy (toot namespace). Always emitted with a canQuote
            automaticApproval list containing the public collection URI.
          properties:
            canQuote:
              type: object
              properties:
                automaticApproval:
                  type: array
                  items:
                    type: string

    # ── Auth / Passkey entities ───────────────────────

    AuthChallenge:
      type: object
      required: [challengeId, challenge, rpId, timeout, userVerification]
      properties:
        challengeId:
          type: string
        challenge:
          type: string
          description: Base64url-encoded random bytes
        rpId:
          type: string
        timeout:
          type: integer
        userVerification:
          type: string

    AuthVerifyRequest:
      type: object
      required: [challengeId, credential]
      properties:
        challengeId:
          type: string
        credential:
          $ref: "#/components/schemas/WebAuthnCredential"

    AuthVerifyResponse:
      type: object
      properties:
        ok:
          type: boolean
        username:
          type: string

    RegistrationChallenge:
      type: object
      required: [challenge, rp, user, pubKeyCredParams, timeout, attestation, authenticatorSelection]
      properties:
        challenge:
          type: string
        rp:
          type: object
          properties:
            name:
              type: string
            id:
              type: string
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            displayName:
              type: string
        pubKeyCredParams:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              alg:
                type: integer
        timeout:
          type: integer
        attestation:
          type: string
        authenticatorSelection:
          type: object
          properties:
            residentKey:
              type: string
            userVerification:
              type: string

    RegisterPasskeyRequest:
      type: object
      required: [token, challengeId, credential]
      properties:
        token:
          type: string
        challengeId:
          type: string
        credential:
          $ref: "#/components/schemas/WebAuthnCredential"

    WebAuthnCredential:
      type: object
      required: [id, rawId, type, response]
      properties:
        id:
          type: string
        rawId:
          type: string
        type:
          type: string
        response:
          type: object
          description: AttestationResponse or AssertionResponse depending on context
          additionalProperties: true
