AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Activity.happitec.com App Stack — Root Orchestrator (nested stacks)

Parameters:
  Stage:
    Type: String
    Default: stage
    AllowedValues:
      - stage
      - prod

  EnvironmentStackName:
    Type: String
    Default: activity-environment-stage

  BootstrapStackName:
    Type: String
    Default: activity-bootstrap
    Description: Bootstrap stack for HostedZoneId and CertificateArn

  ServerDomain:
    Type: String
    Default: happitec.com
    Description: Domain where actor URLs live (e.g. happitec.com)

  HandleDomain:
    Type: String
    Default: happitec.com
    Description: Domain used in handles (@user@happitec.com)

  ProxyDistributionId:
    Type: String
    Default: ""
    Description: CloudFront distribution ID for a parent-domain proxy (cross-invalidation)

  ActivityDistributionId:
    Type: String
    Default: ""
    Description: >-
      CloudFront distribution ID for activity.happitec.com, passed as a
      workflow parameter (not !Ref) to avoid circular dependency with the
      implicit ServerlessRestApi used by InboxFunction.

  ClientApiDomain:
    Type: String
    Default: ""
    Description: >-
      Client API Gateway execute-api domain (e.g. abc123.execute-api.us-east-1.amazonaws.com).
      Passed as a string to avoid circular dependency between ComposeFunction and ClientApi.

  DomainOverride:
    Type: String
    Default: ""
    Description: >-
      Temporary CloudFront alias override for parallel prod migration.
      When set, the CDN stack uses this domain as the CloudFront alias
      instead of the computed domain, avoiding alias conflicts.

Conditions:
  HasActivityDistribution: !Not [!Equals [!Ref ActivityDistributionId, ""]]

Resources:
  FunctionsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: functions/template.yaml
      Parameters:
        Stage: !Ref Stage
        EnvironmentStackName: !Ref EnvironmentStackName
        BootstrapStackName: !Ref BootstrapStackName
        ServerDomain: !Ref ServerDomain
        HandleDomain: !Ref HandleDomain
        ProxyDistributionId: !Ref ProxyDistributionId
        ActivityDistributionId: !Ref ActivityDistributionId
        ClientApiDomain: !Ref ClientApiDomain
        CloudFrontDistributionId: !If
          - HasActivityDistribution
          - !Ref ActivityDistributionId
          - ""

  CdnStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: cdn/template.yaml
      Parameters:
        Stage: !Ref Stage
        EnvironmentStackName: !Ref EnvironmentStackName
        BootstrapStackName: !Ref BootstrapStackName
        ServerlessRestApiId: !GetAtt FunctionsStack.Outputs.ServerlessRestApiId
        ClientApiId: !GetAtt FunctionsStack.Outputs.ClientApiId
        ClientApiDomain: !Ref ClientApiDomain
        ProxyDistributionId: !Ref ProxyDistributionId
        ServerDomain: !Ref ServerDomain
        HandleDomain: !Ref HandleDomain
        DomainOverride: !Ref DomainOverride

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL (direct, bypasses CloudFront)
    Value: !GetAtt FunctionsStack.Outputs.ApiEndpoint
  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !GetAtt CdnStack.Outputs.CloudFrontDistributionId
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDistributionId"
  CloudFrontDomainName:
    Description: CloudFront distribution domain name
    Value: !GetAtt CdnStack.Outputs.CloudFrontDomainName
  ServerDomainOutput:
    Description: Public domain for the federation API
    Value: !GetAtt FunctionsStack.Outputs.ServerDomainOutput
    Export:
      Name: !Sub "${AWS::StackName}-ServerDomain"
  ClientApiUrl:
    Description: Client API endpoint URL
    Value: !GetAtt FunctionsStack.Outputs.ClientApiUrl
    Export:
      Name: !Sub "${AWS::StackName}-ClientApiUrl"
