AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  activity-bootstrap — shared resources that outlive all environments.
  Route 53 hosted zone and ACM wildcard certificate.
  Deployed once, manually. All other stacks import these exports.

Parameters:
  DomainName:
    Type: String
    Description: Required. Base domain for the ActivityPub server (e.g. example.com).

  DnsMode:
    Type: String
    Default: simple
    AllowedValues:
      - simple
      - split
    Description: >
      DNS architecture mode.
      simple: ServerDomain and HandleDomain are the same. The hosted zone
      is for this domain directly. Set your registrar NS records to Route 53.
      split: ServerDomain is a subdomain of HandleDomain (e.g. activity.example.com
      under example.com). Requires NS delegation from the parent zone.


Resources:
  HostedZone:
    DeletionPolicy: Retain
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      HostedZoneConfig:
        Comment: !Sub "ActivityPub server zone for ${DomainName}"

  WildcardCertificate:
    DeletionPolicy: Retain
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "*.${DomainName}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZone

Outputs:
  HostedZoneId:
    Description: Route 53 hosted zone ID
    Value: !Ref HostedZone
    Export:
      Name: !Sub "${AWS::StackName}-HostedZoneId"

  CertificateArn:
    Description: ACM wildcard certificate ARN (apex + wildcard)
    Value: !Ref WildcardCertificate
    Export:
      Name: !Sub "${AWS::StackName}-CertificateArn"

  DomainName:
    Description: The base domain for this ActivityPub server infrastructure
    Value: !Ref DomainName
    Export:
      Name: !Sub "${AWS::StackName}-DomainName"

  NameServers:
    Description: >
      NS records. In simple mode, set these as your domain registrar's
      nameservers. In split mode, add these as NS records in the parent zone.
    Value: !Join
      - ", "
      - !GetAtt HostedZone.NameServers
